# Ehecoatl per-hostname nginx vhost template
#
# This file is intended to be rendered by Ehecoatl runtime/setup logic and then
# published into nginx site configuration for a specific tenant hostname.
#
# Supported replacement tokens in this template:
# Canonical tokens:
# - {{TENANT_ID}}
# - {{TENANT_DOMAIN}}
# - {{SERVER_NAMES}}
# - {{HTTP_UPSTREAM_HOST}}
# - {{HTTP_UPSTREAM_PORT}}
# - {{WS_UPSTREAM_HOST}}
# - {{WS_UPSTREAM_PORT}}
#
# Compatibility aliases still accepted by the renderer:
# - @t(hostname)
# - @t(hostname_www)
# - @t(http_ingress_port)
# - @t(ws_ingress_port)
# - @t(ws_path_prefix)
# - @t(limit_req_zone_name)
# - @t(limit_req_zone_size)
# - @t(limit_req_rate)
# - @t(limit_req_burst)
# - @t(limit_req_mode)
# - @t(limit_conn_zone_name)
# - @t(limit_conn_zone_size)
# - @t(limit_conn_per_ip)
# - @t(tls_cert_path)
# - @t(tls_key_path)
# - @t(access_log_path)
# - @t(error_log_path)
#
# Suggested defaults for renderers:
# - @t(hostname_www) -> www.<hostname> when @t(hostname) does not already start with www.
# - @t(hostname_www) -> <hostname> when @t(hostname) already starts with www.
# - @t(ws_path_prefix) -> /ws/
# - @t(limit_req_zone_name) -> ehecoatl_req_per_ip
# - @t(limit_req_zone_size) -> 10m
# - @t(limit_req_rate) -> 10r/s
# - @t(limit_req_burst) -> 20
# - @t(limit_req_mode) -> nodelay
# - @t(limit_conn_zone_name) -> ehecoatl_conn_per_ip
# - @t(limit_conn_zone_size) -> 10m
# - @t(limit_conn_per_ip) -> 20

limit_req_zone $binary_remote_addr zone=@t(limit_req_zone_name):@t(limit_req_zone_size) rate=@t(limit_req_rate);
limit_conn_zone $binary_remote_addr zone=@t(limit_conn_zone_name):@t(limit_conn_zone_size);

server {
    listen 80;
    listen [::]:80;
    server_name @t(hostname) @t(hostname_www);

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name @t(hostname) @t(hostname_www);

    ssl_certificate @t(tls_cert_path);
    ssl_certificate_key @t(tls_key_path);

    access_log @t(access_log_path);
    error_log @t(error_log_path);

    client_max_body_size 64m;
    limit_req zone=@t(limit_req_zone_name) burst=@t(limit_req_burst) @t(limit_req_mode);
    limit_conn @t(limit_conn_zone_name) @t(limit_conn_per_ip);

    location /_ehecoatl_internal/static/ {
        internal;
        alias @t(tenant_root)/;
    }

    location /_ehecoatl_internal/cache/ {
        internal;
        alias @t(cache_root)/;
    }

    location / {
        proxy_pass http://127.0.0.1:@t(http_ingress_port);
        proxy_http_version 1.1;
        proxy_buffering on;
        proxy_request_buffering on;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location @t(ws_path_prefix) {
        proxy_pass http://127.0.0.1:@t(ws_ingress_port);
        proxy_http_version 1.1;
        proxy_buffering off;
        proxy_request_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Forwarded-Method $request_method;
        proxy_set_header X-Forwarded-Uri $uri;
        proxy_set_header X-Forwarded-Query $args;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }
}
